<!DOCTYPE html>
<html>
<head>
    <title>Verify Withdrawal OTP</title>

    <style>

        body{
            background:#020d2b;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .card{
            background:#091845;
            padding:40px;
            border-radius:20px;
            width:350px;
            color:white;
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            margin-bottom:20px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#1f8cff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0066ff;
        }

        .alert{
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
        }

        .error{
            background:#ff4444;
        }

        .success{
            background:#00c853;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Verify Withdrawal</h2>

    <p>
        Enter the OTP sent to your email
    </p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="otp"
            placeholder="Enter OTP"
            required
        >

        <button type="submit">
            Verify Withdrawal
        </button>

    </form>

</div>

</body>
</html>
