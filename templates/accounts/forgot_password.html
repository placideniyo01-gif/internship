{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Forgot Password</h1>

        <p class="subtitle">
            Enter your email to receive a reset link
        </p>

        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">
                <input
                    type="email"
                    name="email"
                    placeholder="Email Address"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn-auth"
            >
                Send Reset Link
            </button>

        </form>

        <a href="{% url 'login' %}">
            Back to Login
        </a>

    </div>

</div>

</body>
</html>
