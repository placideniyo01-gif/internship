<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <style>

        body{
            margin:0;
            background:#020b2d;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:90%;
            max-width:450px;
            background:#091845;
            padding:35px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.5);
        }

        h2{
            text-align:center;
            color:#1e90ff;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#dcdcdc;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#10245f;
            color:white;
            box-sizing:border-box;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:2px solid #1e90ff;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#1e90ff;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#187bcd;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            color:#1e90ff;
            text-decoration:none;
        }

        .message{
            padding:15px;
            border-radius:12px;
            margin-bottom:20px;
            text-align:center;
            font-weight:bold;
        }

        .success{
            background:#00b894;
        }

        .error{
            background:#e74c3c;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>🔐 Change Password</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="input-group">
            <label>Current Password</label>

            <input type="password"
                   name="current_password"
                   required>
        </div>

        <div class="input-group">
            <label>New Password</label>

            <input type="password"
                   name="new_password"
                   required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>

            <input type="password"
                   name="confirm_password"
                   required>
        </div>

        <button type="submit">
            Send OTP
        </button>

    </form>

    <a href="{% url 'settings' %}"
       class="back">

       ← Back to Settings

    </a>

</div>

</body>
</html>
