<!DOCTYPE html>
<html>
<head>

    <title>Verify OTP</title>

    <style>

        body{
            margin:0;
            background:#020b2d;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:90%;
            max-width:420px;
            background:#091845;
            padding:35px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.5);
            text-align:center;
        }

        h2{
            color:#1e90ff;
        }

        p{
            color:#cfcfcf;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#10245f;
            color:white;
            text-align:center;
            font-size:24px;
            letter-spacing:8px;
            box-sizing:border-box;
            margin-bottom:20px;
        }

        input:focus{
            outline:none;
            border:2px solid #1e90ff;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#00b894;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#009e7d;
        }

        .message{
            padding:15px;
            border-radius:12px;
            margin-bottom:20px;
            font-weight:bold;
        }

        .success{
            background:#00b894;
        }

        .error{
            background:#e74c3c;
        }

        .back{
            display:block;
            margin-top:20px;
            color:#1e90ff;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>📩 Verify OTP</h2>

    <p>
        Enter the 6-digit code sent to your email.
    </p>

    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="otp"
               maxlength="6"
               placeholder="000000"
               required>

        <button type="submit">
            Confirm Password Change
        </button>

    </form>

    <a href="{% url 'settings' %}"
       class="back">

       ← Back to Settings

    </a>

</div>

</body>
</html>
