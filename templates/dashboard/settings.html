<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#020b2d;
            font-family:Arial,sans-serif;
            color:white;
        }

        .container{
            max-width:500px;
            margin:40px auto;
            padding:20px;
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .title h1{
            color:#1e90ff;
            font-size:35px;
            margin-bottom:10px;
        }

        .back-btn{
            color:#1e90ff;
            text-decoration:none;
            font-size:15px;
        }

        .back-btn:hover{
            text-decoration:underline;
        }

        .card{
            background:#091845;
            border-radius:20px;
            padding:20px;
            box-shadow:0 5px 15px rgba(0,0,0,.4);
        }

        .setting-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px;
            margin-bottom:15px;
            border-radius:15px;
            background:#10245f;
            text-decoration:none;
            color:white;
            transition:.3s;
            border:none;
            width:100%;
            cursor:pointer;
            font-size:16px;
            box-sizing:border-box;
        }

        .setting-item:hover{
            background:#16327d;
            transform:translateY(-2px);
        }

        .setting-icon{
            font-size:22px;
            margin-right:15px;
        }

        .left{
            display:flex;
            align-items:center;
        }

        .danger{
            background:#a50000;
        }

        .danger:hover{
            background:#d00000;
        }

        /* Django Messages */

        .message{
            padding:15px;
            margin-bottom:20px;
            border-radius:12px;
            text-align:center;
            font-weight:bold;
            animation:fadeIn .4s ease;
        }

        .message.success{
            background:#00b894;
            color:white;
        }

        .message.error{
            background:#e74c3c;
            color:white;
        }

        .message.warning{
            background:#f39c12;
            color:white;
        }

        /* Modal */

        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.75);
            justify-content:center;
            align-items:center;
            z-index:999;
        }

        .modal-content{
            background:#091845;
            padding:30px;
            border-radius:20px;
            text-align:center;
            width:90%;
            max-width:350px;
            box-shadow:0 0 20px rgba(0,0,0,.4);
        }

        .modal-content h3{
            margin-bottom:20px;
            line-height:1.6;
        }

        .btn-group{
            display:flex;
            gap:10px;
        }

        .btn{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            color:white;
            font-size:15px;
            font-weight:bold;
        }

        .cancel{
            background:gray;
        }

        .logout{
            background:#1e90ff;
        }

        .confirm{
            background:#ff3b30;
        }

        form{
            margin:0;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(-10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="container">

    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="title">

        <h1>⚙ Settings</h1>

        <a href="{% url 'dashboard' %}"
           class="back-btn">

            ← Back to Dashboard

        </a>

    </div>

    <div class="card">

        <!-- CHANGE PASSWORD -->

        <a href="{% url 'change_password' %}"
           class="setting-item">

            <div class="left">

                <span class="setting-icon">
                    🔐
                </span>

                <span>
                    Change Password
                </span>

            </div>

            <span>›</span>

        </a>


        <!-- LOGOUT -->

        <button type="button"
                class="setting-item"
                onclick="showLogoutModal()">

            <div class="left">

                <span class="setting-icon">
                    🚪
                </span>

                <span>
                    Logout
                </span>

            </div>

            <span>›</span>

        </button>


        <!-- DELETE ACCOUNT -->

        <button type="button"
                class="setting-item danger"
                onclick="showDeleteModal()">

            <div class="left">

                <span class="setting-icon">
                    🗑️
                </span>

                <span>
                    Delete Account
                </span>

            </div>

            <span>›</span>

        </button>

    </div>

</div>


<!-- LOGOUT MODAL -->

<div class="modal" id="logoutModal">

    <div class="modal-content">

        <h3>
            Are you sure you want to logout?
        </h3>

        <div class="btn-group">

            <button class="btn cancel"
                    onclick="hideLogoutModal()">

                Cancel

            </button>

            <form action="{% url 'logout' %}"
                  method="post"
                  style="flex:1;">

                {% csrf_token %}

                <button type="submit"
                        class="btn logout"
                        style="width:100%;">

                    Logout

                </button>

            </form>

        </div>

    </div>

</div>


<!-- DELETE ACCOUNT MODAL -->

<div class="modal" id="deleteModal">

    <div class="modal-content">

        <h3>
            This action is permanent.<br><br>

            Are you sure you want
            to delete your account?
        </h3>

        <div class="btn-group">

            <button class="btn cancel"
                    onclick="hideDeleteModal()">

                Cancel

            </button>

            <form method="POST"
                  action="{% url 'delete_account' %}"
                  style="flex:1;">

                {% csrf_token %}

                <button type="submit"
                        class="btn confirm"
                        style="width:100%;">

                    Delete

                </button>

            </form>

        </div>

    </div>

</div>


<script>

    function showLogoutModal(){
        document.getElementById(
            "logoutModal"
        ).style.display = "flex";
    }

    function hideLogoutModal(){
        document.getElementById(
            "logoutModal"
        ).style.display = "none";
    }

    function showDeleteModal(){
        document.getElementById(
            "deleteModal"
        ).style.display = "flex";
    }

    function hideDeleteModal(){
        document.getElementById(
            "deleteModal"
        ).style.display = "none";
    }

    window.onclick = function(event){

        if(event.target ==
           document.getElementById(
               "logoutModal"
           )){

            hideLogoutModal();
        }

        if(event.target ==
           document.getElementById(
               "deleteModal"
           )){

            hideDeleteModal();
        }

    }

</script>

</body>
</html>
